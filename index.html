<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>CN to JP Kanji Converter</title>
</head>
<body>
    <div class="container">
        <h1>Chinese to Japanese Kanji Converter</h1>
        <textarea id="chineseInput" placeholder="Enter Chinese text here..." rows="4" cols="50"></textarea>
        <button id="convertButton">Convert</button>
        <h2>Converted Kanji:</h2>
        <p id="kanjiOutput"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
